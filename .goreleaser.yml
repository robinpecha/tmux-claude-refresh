version: 2

project_name: autoclaude

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  # Versioned archive: autoclaude_0.1.4_linux_amd64.tar.gz (for pinning)
  - id: versioned
    format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
  # Stable-named archive: autoclaude_linux_amd64.tar.gz (version-less)
  # Enables a permanent /releases/latest/download/ URL that always points
  # to the newest build, so the install command never needs updating.
  - id: stable
    format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Os }}_
      {{- .Arch }}

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

# Homebrew formula is managed manually in henryaj/homebrew-tap
